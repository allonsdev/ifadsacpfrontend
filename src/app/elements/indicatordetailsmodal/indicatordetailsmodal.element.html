<div class="modal fade" id="indicatordetailsmodal" tabindex="-1" role="dialog" aria-labelledby="indicatordetailsmodal"
    aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-xl" role="document">
        <div class="modal-content">
            <div class="modal-header m-0">Indicator Details
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">×</span>
                </button>
            </div>
            <div class="modal-body p-0">
                <div class="card card-plain">
                    <div class="card-body">
                        <div class="card-header pb-0 text-left pt-0">
                            <div class="nav-wrapper position-relative end-0 ">
                                <ul class="nav nav-pills nav-fill p-1" role="tablist">
                                    <li class="nav-item">
                                        <a class="nav-link mb-0 px-0 py-1 active" data-bs-toggle="tab"
                                            href="#generalprojectdetails" role="tab"
                                            aria-controls="generalprojectdetails" aria-selected="true">
                                            Indicator Details
                                        </a>
                                    </li>
                                    <li *ngIf="indicator.id > 0" class="nav-item">
                                        <a class="nav-link mb-0 px-0 py-1" data-bs-toggle="tab"
                                            href="#participantsselection" role="tab"
                                            aria-controls="participantsselection" aria-selected="false">
                                            Indicator Tracking
                                        </a>
                                    </li>
                                    <li *ngIf="indicator.id > 0" class="nav-item">
                                        <a class="nav-link mb-0 px-0 py-1" data-bs-toggle="tab"
                                            href="#activityindicatormapping" role="tab"
                                            aria-controls="activityindicatormapping" aria-selected="false">
                                            Map Activities
                                        </a>
                                    </li>
                                    <div class="moving-tab position-absolute nav-link"
                                        style="padding: 0px; transition: all 0.5s ease 0s; transform: translate3d(291px, 0px, 0px); width: 299px;">
                                    </div>
                                </ul>
                            </div>
                        </div>
                        <form role="form text-left" class="tab-content">
                            <div class="tab-pane fade show active" id="generalprojectdetails" role="tabpanel"
                                aria-labelledby="generalprojectdetails-tab">
                                <div class="row mt-3">
                                    <div class="col-12 col-sm-6">
                                        <label for="indicatorCategory">Indicator Category</label>
                                        <select class="form-control" id="indicatorCategory" name="indicatorCategoryId"
                                            [(ngModel)]="indicator.indicatorCategoryId">
                                            <option *ngFor="let item of indicatorCategories" value={{item.Id}}>
                                                {{item.Name}}</option>
                                        </select>
                                    </div>
                                    <div class="col-12 col-sm-6">
                                        <label for="indicatorType">Indicator Type</label>
                                        <select class="form-control" id="indicatorType" name="indicatorTypeId"
                                            [(ngModel)]="indicator.indicatorTypeId" (change)="onSelect($event)">
                                            <option *ngFor="let item of indicatorTypes" value={{item.Id}}>
                                                {{item.Name}}</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="row mt-3">
                                    <div class="col-12 col-sm-6">
                                        <label for="project">Project</label>
                                        <select class="form-control" id="project">
                                            <option value="1" disabled selected>Smallholder Agriculture Cluster Project
                                            </option>
                                        </select>
                                    </div>
                                    <div class="col-12 col-sm-6">
                                        <label for="objective">Objective</label>
                                        <select class="form-control" id="objectivId"
                                            (change)="onObjectiveSelect($event)" [(ngModel)]="indicator.objectiveId"
                                            name="objectiveId">
                                            <option value="" disabled selected></option>
                                            <option *ngFor="let item of objectives" value={{item.id}}>
                                                {{item.name}}</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="row mt-3">
                                    <div class="col-12 col-md-6">
                                        <label for="outcome">Outcome</label>
                                        <select class="form-control" id="outcome" name="outcomeId"
                                            [(ngModel)]="indicator.outcomeId" (change)="onOutcomeSelect($event)">
                                            <option *ngFor="let item of filteredoutcomes" value={{item.id}}>
                                                {{item.name}}</option>
                                        </select>
                                    </div>
                                    <div class="col-12 col-md-6">
                                        <label for="output">Output</label>
                                        <select class="form-control" id="output" name="outputId"
                                            [(ngModel)]="indicator.outputId" (change)="onOutputSelect($event)">
                                            <option *ngFor="let item of filteredoutputs" value={{item.id}}>
                                                {{item.name}}</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="row mt-3">
                                    <div class="col-12 col-md-6">
                                        <label for="activity">Activity</label>
                                        <select class="form-control" id="activity" name="activityId"
                                            [(ngModel)]="indicator.activityId">
                                            <option *ngFor="let item of filteredactivities" value={{item.id}}>
                                                {{item.name}}</option>
                                        </select>
                                    </div>
                                    <div class="col-12 col-md-6">
                                        <label for="indicatorName">Name of Indicator</label>
                                        <input class="form-control" type="text" id="indicatorName" name="name"
                                            [(ngModel)]="indicator.name">
                                    </div>
                                </div>
                                <div class="row mt-3">
                                    <div class="col-12 col-md-6">
                                        <label for="indicatorDescription">Indicator Description</label>
                                        <textarea class="form-control" id="indicatorDescription" name="description"
                                            [(ngModel)]="indicator.description"></textarea>
                                    </div>
                                    <div class="col-12 col-md-6">
                                        <label for="indicatorDefinition">Indicator Definition</label>
                                        <textarea class="form-control" id="indicatorDefinition" name="definition"
                                            [(ngModel)]="indicator.definition"></textarea>
                                    </div>
                                </div>

                                <div class="row mt-3">
                                    <div class="col-12 col-sm-6">
                                        <label for="unitOfMeasurement">Unit Of Measurement</label>
                                        <select class="form-control" id="unitOfMeasurement" name="unitOfMeasurementId"
                                            [(ngModel)]="indicator.unitOfMeasurementId">
                                            <option *ngFor="let item of unitsOfMeasurement" value={{item.Id}}>
                                                {{item.Name}}</option>
                                        </select>
                                    </div>
                                    <div class="col-12 col-sm-6">
                                        <label for="dataSource">Data Source</label>
                                        <select class="form-control" id="dataSource" name="dataSourceId"
                                            [(ngModel)]="indicator.dataSourceId">
                                            <option *ngFor="let item of dataSources" value={{item.Id}}>
                                                {{item.Name}}</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="row mt-3">
                                    <div class="col-12 col-sm-6">
                                        <label for="baselineValue">Baseline Value</label>
                                        <input class="form-control" type="number" id="baselineValue"
                                            name="baselineValue" [(ngModel)]="indicator.baselineValue">
                                    </div>
                                    <div class="col-12 col-sm-6">
                                        <label for="programTargetValue">Program Target Value</label>
                                        <input class="form-control" type="number" id="programTargetValue"
                                            name="programTargetValue" [(ngModel)]="indicator.programTargetValue">
                                    </div>
                                </div>
                                <div class="row mt-3">
                                    <div class="col-12 col-sm-6">
                                        <label for="dataCollectionFrequency">Data Collection Frequency</label>
                                        <select class="form-control" id="dataCollectionFrequency"
                                            name="dataCollectionFrequencyId"
                                            [(ngModel)]="indicator.dataCollectionFrequencyId">
                                            <option *ngFor="let item of dataCollectionFrequencies" value={{item.Id}}>
                                                {{item.Name}}</option>
                                        </select>
                                    </div>
                                    <div class="col-12 col-sm-6">
                                        <label for="responsibleParty">Responsible Party</label>
                                        <input class="form-control" type="text" id="responsibleParty"
                                            name="responsibleParty" [(ngModel)]="indicator.responsibleParty">
                                    </div>
                                </div>
                                <div class="row mt-3">
                                    <div class="col-12 col-md-12 d-flex justify-content-end">
                                        <button *ngIf="indicator.id === 0 || indicator.id === undefined" type="button"
                                            class="btn bg-gradient-primary" (click)="createIndicator()">Save</button>
                                        <button
                                            *ngIf="indicator.id > 0 && currentUser.permissions.includes('AddorEditIndicator')"
                                            type="button" class="btn bg-gradient-primary"
                                            (click)="updateIndicator()">Update</button>
                                        <button type="button" class="btn btn-link  ml-auto"
                                            data-bs-dismiss="modal">Close</button>
                                    </div>
                                </div>
                            </div>
                            <div class="tab-pane fade" id="participantsselection" role="tabpanel"
                                aria-labelledby="participantsselection-tab">

                                <div class="card-body p-3">
                                    <form>
                                        <div class="row mt-3">
                                            <div class="col-12 col-sm-4">
                                                <label>Organisation Name</label>
                                                <select class="form-control" name="organisationId"
                                                    [(ngModel)]="indicatorTarget.organization">
                                                    <option *ngFor="let item of organisations" value={{item.id}}>
                                                        {{item.name}}</option>
                                                </select>
                                            </div>
                                            <div class="col-12 col-sm-4">
                                                <label for="district">District</label>
                                                <select class="form-control" name="districtId"
                                                    [(ngModel)]="indicatorTarget.district">
                                                    <option *ngFor="let item of districts" value={{item.Id}}>
                                                        {{item.Name}}
                                                    </option>
                                                </select>
                                            </div>
                                            <div class="col-12 col-sm-4">
                                                <label for="financial-year">Financial Year</label>
                                                <select class="form-control" name="financialYear"
                                                    [(ngModel)]="indicatorTarget.financialYear">
                                                    <option *ngFor="let item of financialyears" value={{item}}>{{item}}
                                                    </option>
                                                </select>
                                            </div>
                                        </div>
                                        <div class="row mt-3">
                                            <div class="col-12 col-sm-4">
                                                <label for="quarter">Quarter</label>
                                                <select class="form-control" id="quarter" name="quarter"
                                                    [(ngModel)]="indicatorTarget.quarter">
                                                    <option value="" disabled selected>Select Quarter</option>
                                                    <option value="1">Quarter 1</option>
                                                    <option value="2">Quarter 2</option>
                                                    <option value="3">Quarter 3</option>
                                                    <option value="4">Quarter 4</option>
                                                </select>
                                            </div>
                                            <div class="col-12 col-sm-4">
                                                <label for="month">Month</label>
                                                <select class="form-control" id="month" name="month"
                                                    [(ngModel)]="indicatorTarget.month">
                                                    <option value="" disabled selected>Select Month</option>
                                                    <option value="January">January</option>
                                                    <option value="February">February</option>
                                                    <option value="March">March</option>
                                                    <option value="April">April</option>
                                                    <option value="May">May</option>
                                                    <option value="June">June</option>
                                                    <option value="July">July</option>
                                                    <option value="August">August</option>
                                                    <option value="September">September</option>
                                                    <option value="October">October</option>
                                                    <option value="November">November</option>
                                                    <option value="December">December</option>
                                                </select>
                                            </div>
                                            <div class="col-12 col-sm-4">
                                                <label for="target">Target</label>
                                                <input type="number" class="form-control" id="target" name="target"
                                                    placeholder="Enter target" [(ngModel)]="indicatorTarget.target">
                                            </div>
                                        </div>
                                        <div class="row mt-3">
                                            <div class="col-12 col-sm-4">
                                                <label for="achievement">Achievement</label>
                                                <input type="number" class="form-control" id="achievement"
                                                    name="achievement" placeholder="Enter achievement"
                                                    [(ngModel)]="indicatorTarget.achievement">
                                            </div>
                                            <div class="col-12 col-sm-4">
                                                <label for="comments">Comments</label>
                                                <textarea type="text" class="form-control" id="comments" name="comments"
                                                    [(ngModel)]="indicatorTarget.comments"></textarea>
                                            </div>
                                        </div>
                                        <div class="row mt-3">
                                            <div class="col-12">
                                                <button
                                                    *ngIf="(indicatorTarget.id === 0 || indicatorTarget.id === undefined) && currentUser.permissions.includes('AddorEditIndicatorTargets')"
                                                    type="button" class="btn bg-gradient-primary"
                                                    (click)="createIndicatorTarget()">Save</button>
                                                <button
                                                    *ngIf="indicatorTarget.id > 0 && currentUser.permissions.includes('AddorEditIndicatorTargets')"
                                                    type="button" class="btn bg-gradient-primary"
                                                    (click)="updateIndicatorTarget()">Update</button>
                                                <button type="button" class="btn btn-link  ml-auto"
                                                    data-bs-dismiss="modal">Close</button>
                                            </div>
                                        </div>
                                    </form>
                                    <div class="col-lg-12 d-flex justify-content-center">
                                        <div class="card">

                                            <div class="card-body mt-0">
                                                <div class="table-responsive">
                                                    <div class="dataTable-wrapper " id="">
                                                        <div class="dataTable-container ">
                                                            <table
                                                                class="table table-striped table-bordered table-sm row-border hover"
                                                                width="100%" id="IndicatorTargets">
                                                            </table>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="row mt-3">
                                    <div class="col-12 col-sm-4">
                                        <label for="financial-year">Financial Year</label>
                                        <select class="form-control" name="financialYear" (change)="onselect($event)">
                                            <option *ngFor="let item of financialyears" value={{item}}>{{item}}
                                            </option>
                                        </select>
                                    </div>
                                </div>
                                <div class="row mt-4">
                                    <div class="col-md-12 mt-md-0 mt-4">
                                        <div class="card z-index-2">
                                            <div class="card-header p-3 pb-0">
                                                <h6>Tracking By Month</h6>
                                            </div>
                                            <div class="card-body p-3">
                                                <div class="chart-container">
                                                    <canvas id="monthchart" height="100px">{{monthchart}}</canvas>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="row mt-4">
                                    <div class="col-md-12 mt-md-0 mt-4">
                                        <div class="card z-index-2">
                                            <div class="card-header p-3 pb-0">
                                                <h6>Tracking By Quarter</h6>
                                            </div>
                                            <div class="card-body p-3">
                                                <div class="chart-container h-300">
                                                    <canvas id="quarterchart" height="100px">{{quarterchart}}</canvas>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                            </div>
                            <div class="tab-pane fade" id="activityindicatormapping" role="tabpanel"
                                aria-labelledby="activityindicatormapping-tab">

                                <div class="card-body p-3">
                                    <div class="col-lg-12 d-flex justify-content-center">
                                        <div class="card">

                                            <div class="card-body mt-0">
                                                <div class="table-responsive">
                                                    <div class="dataTable-wrapper " id="">
                                                        <div class="dataTable-container ">
                                                            <table
                                                                class="table table-striped table-bordered table-sm row-border hover"
                                                                width="100%" id="dtIndicatorActivities">
                                                            </table>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="row mt-3">
                                    <div class="col-12 col-md-12 d-flex justify-content-center">
                                        <button *ngIf="currentUser.permissions.includes('AddorEditIndicatorTargets')"
                                            type="button" class="btn bg-gradient-primary"
                                            (click)="sendSelectedData()">Save</button>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
