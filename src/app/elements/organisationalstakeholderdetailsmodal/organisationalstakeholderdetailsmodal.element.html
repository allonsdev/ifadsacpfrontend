<div class="modal fade" id="organisationalstakeholderdetailsmodal" tabindex="-1" role="dialog"
    aria-labelledby="organisationalstakeholderdetailsmodal" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg" role="document">
        <div class="modal-content">
            <div class="modal-header m-0">
                <h6 class="modal-title" id="modal-title-default">Stakeholder Details</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">×</span>
                </button>

            </div>
            <div class="modal-body p-0">
                <div class="card card-plain">
                    <div class="card-body">
                        <form role="form text-left" class="tab-content">
                            <div class="tab-pane fade show active" id="staffdetails" role="tabpanel"
                                aria-labelledby="staffdetails-tab">
                                <div class="row mt-3">

                                    <div class="col-12 col-sm-6">
                                        <label>District</label>
                                        <select class="form-control" name="districtId"
                                            [(ngModel)]="organisation.districtId">
                                            <option *ngFor="let item of districts" value={{item.Id}}>{{item.Name}}
                                            </option>
                                        </select>
                                    </div>
                                    <div class="col-12 col-sm-6">
                                        <label>Organization Type</label>
                                        <select class="form-control" name="type" [(ngModel)]="organisation.type">
                                            <option *ngFor="let item of organisationTypes" value={{item.Id}}>
                                                {{item.Name}}</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="row mt-3">
                                    <div class="col-12 col-sm-6">
                                        <label>Organization Name</label>
                                        <input class="form-control" type="text" name="name"
                                            [(ngModel)]="organisation.name" />
                                    </div>
                                    <div class="col-12 col-sm-6">
                                        <label>Organizational Description</label>
                                        <textarea class="form-control" name="description"
                                            [(ngModel)]="organisation.description"></textarea>
                                    </div>
                                </div>
                                <div class="row mt-3">
                                    <div class="col-12 col-sm-6">
                                        <label>Primary Contact Person</label>
                                        <input class="form-control" type="text" name="contactName"
                                            [(ngModel)]="organisation.contactName" />
                                    </div>
                                    <div class="col-12 col-sm-6 mt-3 mt-sm-0">
                                        <label>Phone Number</label>
                                        <input class="form-control" type="tel" name="contactNo"
                                            [(ngModel)]="organisation.contactNo" />
                                    </div>
                                </div>
                                <div class="row mt-3">
                                    <div class="col-12 col-sm-6">
                                        <label>Physical Address</label>
                                        <textarea class="form-control" name="address"
                                            [(ngModel)]="organisation.address"></textarea>
                                    </div>
                                    <div class="col-12 col-sm-6">
                                        <label>Email</label>
                                        <input class="form-control" type="email" name="emailAddress"
                                            [(ngModel)]="organisation.emailAddress" />
                                    </div>
                                </div>
                                <div class="row mt-3">
                                    <div class="col-12 col-sm-6 mt-3 mt-sm-0">
                                        <label>Longitude</label>
                                        <input class="form-control" type="number" name="longitude"
                                            [(ngModel)]="organisation.longitude" />
                                    </div>
                                    <div class="col-12 col-sm-6">
                                        <label>Latitude</label>
                                        <input class="form-control" type="number" name="latitude"
                                            [(ngModel)]="organisation.latitude" />
                                    </div>
                                </div>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button *ngIf="organisation.id === 0 || organisation.id === undefined" type="button"
                    class="btn bg-gradient-primary" (click)="createOrganisation()">Save</button>
                <button *ngIf="organisation.id > 0 && currentUser.permissions.includes('AddOrEditOrganisation')"
                    type="button" class="btn bg-gradient-primary" (click)="updateOrganisation()">Update</button>
                <button type="button" class="btn btn-link  ml-auto" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>
