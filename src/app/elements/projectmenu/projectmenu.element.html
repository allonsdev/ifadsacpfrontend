<aside style="z-index: -10000;"
  class="sidenav bg-white navbar navbar-vertical navbar-expand-xs border-0 border-radius-xl my-3 fixed-start mx-4"
  id="sidenav-main">
  <div class="sidenav-header">
    <i class="fas fa-times p-3 cursor-pointer text-secondary opacity-5 position-absolute end-0 top-0 d-none d-xl-none"
      aria-hidden="true" id="iconSidenav"></i>
    <a class="navbar-brand m-0" routerLink="/home/">
      <img src="assets/img/SACPCropped.jpg" class="navbar-brand-img h-100" alt="main_logo">
      <span class="ms-1 font-weight-bold">SACP</span>
    </a>
  </div>

  <hr class="horizontal dark mt-0">

  <div class="collapse navbar-collapse w-auto h-auto" id="sidenav-collapse-main">
    <ul class="navbar-nav">
      <ng-container *ngFor="let menuItem of menuItems">

        <li class="nav-item" *ngIf="!menuItem.parentId">
          <ng-container *ngIf="!isParent(menuItem); else parentMenu">
            <a class="nav-link m-1" [routerLink]="menuItem.url" routerLinkActive="active">
              <!-- <div class="icon icon-shape icon-sm text-center d-flex align-items-center justify-content-center"></div> -->
              <span class="nav-link-text ms-1">{{ menuItem.name }}</span>
            </a>
          </ng-container>

          <ng-template #parentMenu>
            <a data-bs-toggle="collapse" [href]="'#' + menuItem.uid" class="nav-link m-1"
              [attr.aria-controls]="menuItem.uid" role="button" aria-expanded="false">
              <!-- <div class="icon icon-shape icon-sm text-center d-flex align-items-center justify-content-center"></div> -->
              <span class="nav-link-text ms-1">{{ menuItem.name }}</span>
            </a>

            <div [id]="menuItem.uid" class="collapse">
              <ul class="nav ms-4">
                <li class="nav-item" *ngFor="let childItem of getChildItems(menuItem)">
                  <ng-container *ngIf="!isParent(childItem); else subParentMenu">
                    <a class="nav-link mx-0" [routerLink]="childItem.url" routerLinkActive="active">
                      <span class="sidenav-mini-icon">{{ childItem.name.charAt(0) }}</span>
                      <span class="sidenav-normal">{{ childItem.name }}</span>
                    </a>
                  </ng-container>

                  <ng-template #subParentMenu>
                    <a data-bs-toggle="collapse" [href]="'#' + childItem.uid" class="nav-link"
                      [attr.aria-controls]="childItem.uid" role="button" aria-expanded="false">
                      <span class="sidenav-mini-icon">{{ childItem.name.charAt(0) }}</span>
                      <span class="sidenav-normal">{{ childItem.name }}</span>
                    </a>

                    <div [id]="childItem.uid" class="collapse">
                      <ul class="nav ms-4">
                        <li class="nav-item" *ngFor="let subChildItem of getChildItems(childItem)">
                          <a class="nav-link" [routerLink]="subChildItem.url" routerLinkActive="active">
                            <span class="sidenav-mini-icon">{{ subChildItem.name.charAt(0) }}</span>
                            <span class="sidenav-normal">{{ subChildItem.name }}</span>
                          </a>
                        </li>
                      </ul>
                    </div>
                  </ng-template>
                </li>
              </ul>
            </div>
          </ng-template>
        </li>
      </ng-container>
    </ul>
  </div>
</aside>
