<div
  class="modal fade"
  id="appointmentdetailsmodal"
  tabindex="-1"
  role="dialog"
  aria-labelledby="editprofilemodal"
  aria-hidden="true"
>
  <div class="modal-dialog modal-dialog-centered modal-xl" role="document">
    <div class="modal-content">
      <div class="modal-header m-0">
        General Activity Details
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
          aria-label="Close"
        >
          <span aria-hidden="true">×</span>
        </button>
      </div>
      <div class="modal-body p-0">
        <div class="card card-plain">
          <div class="card-body">
            <div class="card-header pb-0 text-left pt-0">
              <div class="nav-wrapper position-relative end-0">
                <ul class="nav nav-pills nav-fill p-1" role="tablist">
                  <li class="nav-item">
                    <a
                      class="nav-link mb-0 px-0 py-1 active"
                      data-bs-toggle="tab"
                      href="#generalactivitydetails"
                      role="tab"
                      aria-controls="generalactivitydetails"
                      aria-selected="true"
                    >
                      General Activity Details
                    </a>
                  </li>
                  <li *ngIf="generalActivity.id > 0" class="nav-item">
                    <a
                      class="nav-link mb-0 px-0 py-1"
                      data-bs-toggle="tab"
                      href="#participantsselection"
                      role="tab"
                      aria-controls="participantsselection"
                      aria-selected="false"
                    >
                      Participants Selection
                    </a>
                  </li>

                  <li *ngIf="generalActivity.id > 0" class="nav-item">
                    <a
                      class="nav-link mb-0 px-0 py-1"
                      data-bs-toggle="tab"
                      href="#participantcapture"
                      role="tab"
                      aria-controls="participantcapture"
                      aria-selected="false"
                    >
                      Participant Capture
                    </a>
                  </li>
                  <li *ngIf="generalActivity.id > 0" class="nav-item">
                    <a
                      class="nav-link mb-0 px-0 py-1"
                      data-bs-toggle="tab"
                      href="#participantsupload"
                      role="tab"
                      aria-controls="fileupload"
                      aria-selected="false"
                    >
                      Excel Upload
                    </a>
                  </li>



                  <li *ngIf="generalActivity.id > 0" class="nav-item">
                    <a
                      class="nav-link mb-0 px-0 py-1"
                      data-bs-toggle="tab"
                      href="#stakeholderupload"
                      role="tab"
                      aria-controls="stakeholderupload"
                      aria-selected="false"
                    >
                      Stakeholder Upload
                    </a>
                  </li>



                  <li *ngIf="generalActivity.id > 0" class="nav-item">
                    <a
                      class="nav-link mb-0 px-0 py-1"
                      data-bs-toggle="tab"
                      href="#fileupload"
                      role="tab"
                      aria-controls="fileupload"
                      aria-selected="false"
                    >
                      Attachments
                    </a>
                  </li>
                  <div
                    class="moving-tab position-absolute nav-link"
                    style="
                      padding: 0px;
                      transition: all 0.5s ease 0s;
                      transform: translate3d(291px, 0px, 0px);
                      width: 299px;
                    "
                  ></div>
                </ul>
              </div>
            </div>
            <form role="form text-left" class="tab-content">
              <div
                class="tab-pane fade show active"
                id="generalactivitydetails"
                role="tabpanel"
                aria-labelledby="generalactivitydetails-tab"
              >
                <div class="row mt-3">
                  <div class="col-12 col-sm-4">
                    <label for="project">Project</label>
                    <!-- <select
                      class="form-control"
                      id="project"
                      name="project"
                      [(ngModel)]="generalActivity.projectId"
                    >
                      <option [value]="1">
                        Smallholder Agriculture Cluster Project
                      </option>
                    </select> -->
                    <input
                      type="text"
                      class="form-control"
                      id="project"
                      name="project"
                      [value]="' Smallholder Agriculture Cluster Project'"
                      [placeholder]="' Smallholder Agriculture Cluster Project'"
                      disabled
                    />
                  </div>
                  <div class="col-12 col-sm-4">
                    <label for="organisation">Organisation</label>
                    <select
                      class="form-control"
                      id="organisation"
                      name="organisationId"
                      [(ngModel)]="generalActivity.organisationId"
                    >
                      <option
                        *ngFor="let item of organisations"
                        value="{{item.id}}"
                      >
                        {{item.name}}
                      </option>
                    </select>
                  </div>

                  <div class="col-12 col-sm-4">
                    <label for="subComponent">Activity</label>
                    <select
                      class="form-control"
                      id="subComponent"
                      name="subComponentId"
                      [(ngModel)]="generalActivity.subComponentId"
                      (change)="onSubComponentSelect($event)"
                    >
                      <option
                        *ngFor="let item of subComponents"
                        [value]="item.id"
                      >
                        {{item.description}}
                      </option>
                    </select>
                  </div>
                </div>

                <div class="row mt-3">
                  <div class="col-12 col-sm-6">
                    <label for="activity">Sub-Activitity</label>
                    <select
                      class="form-control"
                      id="activity"
                      name="activityId"
                      [(ngModel)]="generalActivity.activityId"
                    >
                      <option
                        *ngFor="let item of filteredSubActivities"
                        value="{{item.id}}"
                      >
                        {{item.description}}
                      </option>
                    </select>
                  </div>
                  <div class="col-12 col-sm-6">
                    <label for="activestatus">Active Status</label>
                    <select
                      class="form-control"
                      id="activestatus"
                      name="activeStatusId"
                      [(ngModel)]="generalActivity.activeStatusId"
                    >
                      <option
                        *ngFor="let item of activityStatuses"
                        value="{{item.Id}}"
                      >
                        {{item.Name}}
                      </option>
                    </select>
                  </div>
                </div>
                <div class="row mt-3">
                  <div class="col-12 col-sm-6">
                    <label for="district">District</label>
                    <select
                      class="form-control"
                      id="district"
                      name="districtId"
                      [(ngModel)]="generalActivity.districtId"
                    >
                      <option
                        *ngFor="let item of districts"
                        value="{{item.Id}}"
                      >
                        {{item.Name}}
                      </option>
                    </select>
                  </div>
                  <div class="col-12 col-sm-6">
                    <label for="site">Site</label>
                    <input
                      class="form-control"
                      type="text"
                      id="site"
                      name="site"
                      [(ngModel)]="generalActivity.site"
                    />
                  </div>
                </div>

                <div class="row mt-3">
                  <div class="col-12 col-sm-6">
                    <label for="leadfacilitator">Lead Facilitator</label>
                    <select
                      class="form-control"
                      id="leadfacilitator"
                      name="leadFacilitatorId"
                      [(ngModel)]="generalActivity.leadFacilitatorId"
                    >
                      <option
                        *ngFor="let item of facilitators"
                        value="{{item.id}}"
                      >
                        {{item.staffFullName}}
                      </option>
                    </select>
                  </div>
                  <div class="col-12 col-sm-6 mt-3 mt-sm-0">
                    <label for="otherfacilitators">Other Facilitators</label>
                    <select
                      multiple
                      class="form-control"
                      id="otherfacilitators"
                      name="otherFacilitatorIds"
                      [(ngModel)]="otherFacilitatorIds"
                    >
                      <option
                        *ngFor="let item of facilitators"
                        value="{{item.id}}"
                      >
                        {{item.staffFullName}}
                      </option>
                    </select>
                  </div>
                </div>
                <div class="row mt-3">
                  <div class="col-12 col-sm-12 mt-3 mt-sm-0">
                    <label for="subject">Details</label>
                    <textarea
                      class="form-control"
                      type="text"
                      id="details"
                      name="details"
                      [(ngModel)]="generalActivity.details"
                    ></textarea>
                  </div>
                </div>
                <div class="row mt-3">
                  <div class="col-12 col-sm-6 mt-3 mt-sm-0">
                    <label for="startDate">Start Date</label>
                    <input
                      class="form-control"
                      type="date"
                      id="startDate"
                      name="startDate"
                      [(ngModel)]="generalActivity.startDate"
                      (change)="updateEndDateMin()"
                    />
                  </div>
                  <div class="col-12 col-sm-6 mt-3 mt-sm-0">
                    <label for="endDate">End Date</label>
                    <input
                      class="form-control"
                      type="date"
                      id="endDate"
                      name="endDate"
                      [(ngModel)]="generalActivity.endDate"
                      [min]="minEndDate"
                      [disabled]="!generalActivity.startDate"
                    />
                  </div>
                </div>

                <div class="row mt-3">
                  <div class="col-12 col-md-12 d-flex justify-content-end">
                    <button
                      *ngIf="generalActivity.id === 0 || generalActivity.id === undefined"
                      type="button"
                      class="btn bg-gradient-primary"
                      (click)="createGeneralActivity()"
                    >
                      Save
                    </button>

                    <button
                      *ngIf="generalActivity.id > 0 && currentUser.permissions.includes('AddOrEditGeneralActivity')"
                      type="button"
                      class="btn bg-gradient-primary"
                      (click)="updateGeneralActivity()"
                    >
                      Update
                    </button>
                    <button
                      type="button"
                      class="btn btn-link ml-auto"
                      data-bs-dismiss="modal"
                    >
                      Close
                    </button>
                  </div>
                </div>
              </div>
              <div
                class="tab-pane fade"
                id="participantsselection"
                role="tabpanel"
                aria-labelledby="participantsselection-tab"
              >
                <div class="card-body mt-0">
                  <div class="row mb-2">
                    <div class="col-12 col-sm-12">
                      <label for="groupType">Participant Type</label>
                      <select
                        class="form-control"
                        id="groupType"
                        (change)="onSelect($event)"
                      >
                        <option value="" selected disabled>
                          Select Participant Type
                        </option>
                        <option
                          *ngFor="let item of participantTypes"
                          value="{{item.Id}}"
                        >
                          {{item.Name}}
                        </option>
                      </select>
                    </div>
                  </div>
                  <div class="card-body mt-0">
                    <div class="table-responsive">
                      <div class="dataTable-wrapper" id="">
                        <div class="dataTable-container">
                          <table
                            class="table table-striped table-bordered table-sm row-border hover"
                            width="100%"
                            id="dtParticipants"
                          ></table>
                        </div>
                      </div>
                    </div>
                  </div>
                  <div class="row mt-3">
                    <div class="col-12 col-md-12 d-flex justify-content-end">
                      <button
                        *ngIf="currentUser.permissions.includes('SelectParticipants')"
                        type="button"
                        class="btn bg-gradient-primary"
                        (click)="sendSelectedData()"
                      >
                        Save
                      </button>
                      <button
                        type="button"
                        class="btn btn-link ml-auto"
                        data-bs-dismiss="modal"
                      >
                        Close
                      </button>
                    </div>
                  </div>
                </div>
              </div>

              <div
                class="tab-pane fade show"
                id="participantcapture"
                role="tabpanel"
                aria-labelledby="participantcapture-tab"
              >
                <div class="row mt-3">
                  <div class="col-12 col-sm-4">
                    <label for="hhNationalId">Household identity number </label>
                    <input
                      type="text"
                      class="form-control"
                      id="hhNationalId"
                      name="hhNationalId"
                      [(ngModel)]="participant.hhNationalId"
                    />
                  </div>

                  <div class="col-12 col-sm-4">
                    <label for="firstName">First Name</label>
                    <input
                      type="text"
                      class="form-control"
                      id="firstName"
                      name="firstName"
                      [(ngModel)]="participant.firstName"
                    />
                  </div>

                  <div class="col-12 col-sm-4">
                    <label for="surname">Surname</label>
                    <input
                      type="text"
                      class="form-control"
                      id="surname"
                      name="surname"
                      [(ngModel)]="participant.surname"
                    />
                  </div>
                </div>

                <div class="row mt-3">
                  <div class="col-12 col-sm-4">
                    <label for="gender">Gender</label>
                    <select
                      class="form-control"
                      id="gender"
                      name="gender"
                      [(ngModel)]="participant.gender"
                    >
                      <option value="M">Male</option>
                      <option value="F">Female</option>
                    </select>
                  </div>

                  <div class="col-12 col-sm-4">
                    <label for="yearOfBirth">Year of Birth</label>
                    <input
                      type="number"
                      class="form-control"
                      id="yearOfBirth"
                      name="yearOfBirth"
                      [(ngModel)]="participant.yearOfBirth"
                    />
                  </div>

                  <div class="row mt-3">
                    <div class="col-12 col-sm-6">
                      <label for="groupType">Category</label>
                      <select
                        class="form-control"
                        id="groupType"
                        name="groupType"
                        [(ngModel)]="participant.groupType"
                      >
                        <option value="" disabled selected>Select...</option>
                        <option value="APG">APG</option>
                        <option value="VBU">VBU</option>
                        <option value="MSE">MSE</option>
                        <option value="VLCE">VLCE</option>
                      </select>
                    </div>

                    <div class="col-12 col-sm-6">
                      <label for="categoryName"
                        >Name of the Selected Category</label
                      >
                      <input
                        type="text"
                        class="form-control"
                        id="categoryName"
                        name="categoryName"
                        [(ngModel)]="participant.categoryName"
                      />
                    </div>
                  </div>

                  <div class="col-12 col-sm-4">
                    <label for="participantNationalId"
                      >National ID of person</label
                    >
                    <input
                      type="text"
                      class="form-control"
                      id="participantNationalId"
                      name="participantNationalId"
                      [(ngModel)]="participant.participantNationalId"
                    />
                  </div>
                </div>

                <div class="row mt-3">
                  <div class="col-12 col-sm-4">
                    <label for="pwdTin">PWD</label>
                    <input
                      type="text"
                      class="form-control"
                      id="pwdTin"
                      name="pwdTin"
                      [(ngModel)]="participant.pwdTin"
                    />
                  </div>

                  <div class="col-12 col-sm-4">
                    <label for="hhGender">Gender of Household (WHH/MHH)</label>
                    <select
                      class="form-control"
                      id="hhGender"
                      name="hhGender"
                      [(ngModel)]="participant.hhGender"
                    >
                      <option value="WHH">WHH</option>
                      <option value="MHH">MHH</option>
                    </select>
                  </div>

                  <div class="col-12 col-sm-4">
                    <label for="contactNumber">Contact Number</label>
                    <input
                      type="text"
                      class="form-control"
                      id="contactNumber"
                      name="contactNumber"
                      [(ngModel)]="participant.contactNumber"
                    />
                  </div>
                </div>

                <div class="row mt-3">
                  <div class="col-12 col-md-12 d-flex justify-content-end">
                    <button
                      type="button"
                      class="btn bg-gradient-primary"
                      (click)="saveParticipant()"
                    >
                      Save
                    </button>
                    <button
                      type="button"
                      class="btn btn-link ml-auto"
                      data-bs-dismiss="modal"
                    >
                      Close
                    </button>
                  </div>
                </div>
              </div>

              <div
                class="tab-pane fade"
                id="participantsupload"
                role="tabpanel"
                aria-labelledby="participantsupload-tab"
              >
                <div class="card-body mt-0">
                  <div class="row mb-2">
                    <div class="col-12 col-sm-6">
                      <label for="formFile" class="form-label">File</label>
                      <input
                        class="form-control"
                        type="file"
                        id="formFile"
                        [(ngModel)]="file"
                        name="file"
                        (change)="readExcelFile($event)"
                      />
                    </div>
                    <div class="col-12 col-sm-6">
                      <button
                        type="button"
                        class="btn bg-gradient-primary"
                        (click)="displayData()"
                      >
                        Preview
                      </button>
                    </div>
                  </div>
                  <div class="card-body mt-0">
                    <div class="table-responsive">
                      <div class="dataTable-wrapper">
                        <div class="dataTable-container">
                          <table
                            class="table table-striped table-bordered table-sm row-border hover"
                            width="100%"
                            id="dtPreview"
                          ></table>
                        </div>
                      </div>
                    </div>
                  </div>
                  <div class="row mt-3">
                    <div class="col-12 col-md-12 d-flex justify-content-end">
                      <button
                        *ngIf="currentUser.permissions.includes('SelectParticipants')"
                        type="button"
                        class="btn bg-gradient-primary"
                        (click)="UploadData()"
                      >
                        Save
                      </button>
                    </div>
                  </div>

                  <!-- Import Results Table -->
                  <div
                    class="card-body mt-4"
                    *ngIf="uploadResults?.results?.length"
                  >
                    <h6>Import Results</h6>
                    <p>
                      <strong>Success:</strong> {{ uploadResults.totalSuccess }}
                      | <strong>Failed:</strong> {{ uploadResults.totalFailed }}
                    </p>

                    <div class="table-responsive">
                      <div class="dataTable-wrapper">
                        <div class="dataTable-container">
                          <table
                            class="table table-striped table-bordered table-sm row-border hover"
                            width="100%"
                            id="dtResults"
                          ></table>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

      <div
                class="tab-pane fade"
                id="stakeholderupload"
                role="tabpanel"
                aria-labelledby="stakeholderupload-tab"
              >
                <div class="card-body mt-0">
                  <div class="row mb-2">
                    <div class="col-12 col-sm-6">
                      <label for="formFile" class="form-label">Upload Stakeholder</label>
                      <input
                        class="form-control"
                        type="file"
                        id="formFile1"
                        [(ngModel)]="file"
                        name="file"
                        (change)="readExcelFile($event)"
                      />
                    </div>
                    <div class="col-12 col-sm-6">
                      <button
                        type="button"
                        class="btn bg-gradient-primary"
                        (click)="displayData2()"
                      >
                        Preview Data
                      </button>
                    </div>
                  </div>
                  <div class="card-body mt-0">
                    <div class="table-responsive">
                      <div class="dataTable-wrapper">
                        <div class="dataTable-container">
                          <table
                            class="table table-striped table-bordered table-sm row-border hover"
                            width="100%"
                            id="dtPreview1"
                          ></table>
                        </div>
                      </div>
                    </div>
                  </div>
                  <div class="row mt-3">
                    <div class="col-12 col-md-12 d-flex justify-content-end">
                      <button
                        *ngIf="currentUser.permissions.includes('SelectParticipants')"
                        type="button"
                        class="btn bg-gradient-primary"
                        (click)="uploadStakeholder()"
                      >
                        Save Data
                      </button>
                    </div>
                  </div>
                </div>
              </div>


              <div
                class="tab-pane fade"
                id="fileupload"
                role="tabpanel"
                aria-labelledby="fileupload-tab"
              >
                <form
                  (ngSubmit)="onSubmit()"
                  role="form text-left"
                  class="tab-content"
                >
                  <div class="row mt-3">
                    <div class="col-12 col-sm-6">
                      <label>File Type</label>
                      <select
                        class="form-control"
                        name="fileType"
                        [(ngModel)]="fileType"
                      >
                        <option value="" disabled selected>
                          Select File Type
                        </option>
                        <option
                          *ngFor="let item of fileTypes"
                          value="{{item.Name}}"
                        >
                          {{item.Name}}
                        </option>
                      </select>
                    </div>
                    <div class="col-12 col-sm-6 mt-3 mt-sm-0">
                      <label>Title</label>
                      <input
                        class="form-control"
                        name="title"
                        [(ngModel)]="title"
                        type="text"
                      />
                    </div>
                  </div>
                  <div class="row mt-3">
                    <div class="col-12 col-sm-6">
                      <label>Author</label>
                      <input
                        class="form-control"
                        name="author"
                        [(ngModel)]="author"
                        type="text"
                      />
                    </div>
                    <div class="col-12 col-sm-6 mt-3 mt-sm-0">
                      <label>Author Organisation</label>
                      <input
                        class="form-control"
                        name="authorOrganization"
                        [(ngModel)]="authorOrganization"
                        type="text"
                      />
                    </div>
                  </div>
                  <div class="row mt-3">
                    <div class="col-12 col-sm-6 mt-3 mt-sm-0">
                      <label>Description</label>
                      <textarea
                        class="form-control"
                        name="description"
                        [(ngModel)]="description"
                        type="text"
                      ></textarea>
                    </div>
                    <div class="col-12 col-sm-6">
                      <label>File Date</label>
                      <input
                        class="form-control"
                        name="uploadDate"
                        [(ngModel)]="uploadDate"
                        type="date"
                      />
                    </div>
                  </div>
                  <div class="row mt-3">
                    <div class="mb-3">
                      <label for="formFile" class="form-label">File</label>
                      <input
                        class="form-control"
                        type="file"
                        id="formFile"
                        (change)="onFileChange($event)"
                      />
                    </div>
                  </div>
                  <div class="row mt-3">
                    <div class="col-12 col-sm-6 mt-3 mt-sm-0">
                      <button
                        *ngIf="currentUser.permissions.includes('AddOrDeleteFile')"
                        type="submit"
                        class="btn btn-primary"
                      >
                        Submit
                      </button>
                      <button
                        type="button"
                        class="btn btn-link ml-auto"
                        data-bs-dismiss="modal"
                      >
                        Close
                      </button>
                    </div>
                  </div>
                </form>
                <div class="card-body mt-0">
                  <div class="table-responsive">
                    <div class="dataTable-wrapper" id="">
                      <div class="dataTable-container">
                        <table
                          class="table table-striped table-bordered table-sm row-border hover"
                          width="100%"
                          id="dtActivityFiles"
                        ></table>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
