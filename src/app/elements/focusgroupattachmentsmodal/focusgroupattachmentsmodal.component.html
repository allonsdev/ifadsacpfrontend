<div class="modal fade" id="focusgroupattachmentsmodal" tabindex="-1" role="dialog"
    aria-labelledby="focusgroupattachmentsmodal" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg" role="document">
        <div class="modal-content">
            <div class="modal-header m-0">File Details
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">×</span>
                </button>
            </div>
            <div class="modal-body p-0">
                <div class="card card-plain">
                    <div class="card-body">
                        <form (ngSubmit)="onSubmit()" role="form text-left" class="tab-content">
                            <div class="row mt-3">
                                <div class="col-12 col-sm-6">
                                    <label>File Type</label>
                                    <select class="form-control" name="fileType" [(ngModel)]="fileType">
                                        <option value="" disabled selected>Select File Type</option>
                                        <option *ngFor="let item of fileTypes" value={{item.Id}}>{{item.Name}}</option>
                                    </select>
                                </div>
                                <div class="col-12 col-sm-6 mt-3 mt-sm-0">
                                    <label>Title</label>
                                    <input class="form-control" name="title" [(ngModel)]="title" type="text" />
                                </div>
                            </div>
                            <div class="row mt-3">
                                <div class="col-12 col-sm-6">
                                    <label>Author</label>
                                    <input class="form-control" name="author" [(ngModel)]="author" type="text" />
                                </div>
                                <div class="col-12 col-sm-6 mt-3 mt-sm-0">
                                    <label>Author Organisation</label>
                                    <input class="form-control" name="authorOrganization"
                                        [(ngModel)]="authorOrganization" type="text" />
                                </div>
                            </div>
                            <div class="row mt-3">

                                <div class="col-12 col-sm-6 mt-3 mt-sm-0">
                                    <label>Description</label>
                                    <textarea class="form-control" name="description" [(ngModel)]="description"
                                        type="text"></textarea>
                                </div>
                                <div class="col-12 col-sm-6">
                                    <label>Upload Date</label>
                                    <input class="form-control" name="uploadDate" [(ngModel)]="uploadDate"
                                        type="date" />
                                </div>
                            </div>
                            <div class="row mt-3">
                                <div class="mb-3">
                                    <label for="formFile" class="form-label">File</label>
                                    <input class="form-control" type="file" id="formFile"
                                        (change)="onFileChange($event)">
                                </div>
                            </div>
                            <div class="row mt-3">
                                <div class="col-12 col-sm-6 mt-3 mt-sm-0">

                                    <button *ngIf="currentUser.permissions.includes('AddOrDeleteFile')" type="submit"
                                        class="btn btn-primary">Submit</button>
                                    <button type="button" class="btn btn-link  ml-auto"
                                        data-bs-dismiss="modal">Close</button>
                                </div>
                            </div>
                            <div class="card-body mt-0">
                                <div class="table-responsive">
                                    <div class="dataTable-wrapper " id="">
                                        <div class="dataTable-container ">
                                            <table class="table table-striped table-bordered table-sm row-border hover"
                                                width="100%" id="dtFGD">
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
