<div class="modal fade" id="groupdetailsmodal" tabindex="-1" role="dialog" aria-labelledby="groupdetailsmodal"
    aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg" role="document">
        <div class="modal-content">
            <div class="modal-header m-0">Group Details
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">×</span>
                </button>
            </div>
            <div class="modal-body p-0">
                <div class="card card-plain">
                    <div class="card-body">
                        <div class="card-header pb-0 text-left pt-0">
                            <div class="nav-wrapper position-relative end-0">
                                <ul class="nav nav-pills nav-fill p-1" role="tablist">
                                    <ng-container *ngIf="!isEditMode; else editModeTabs">
                                        <li class="nav-item">
                                            <a class="nav-link mb-0 px-0 py-1" data-bs-toggle="tab"
                                                href="#generalprojectdetails" role="tab"
                                                aria-controls="generalprojectdetails" aria-selected="true">
                                                Group Details
                                            </a>
                                        </li>
                                    </ng-container>
                                    <ng-template #editModeTabs>
                                        <li class="nav-item">
                                            <a class="nav-link mb-0 px-0 py-1" data-bs-toggle="tab"
                                                href="#generalprojectdetails" role="tab"
                                                aria-controls="generalprojectdetails" aria-selected="true">
                                                Group Details
                                            </a>
                                        </li>
                                        <!-- Add other tabs for edit mode here -->
                                        <li class="nav-item">
                                            <a class="nav-link mb-0 px-0 py-1" data-bs-toggle="tab"
                                                href="#participantsselection" role="tab"
                                                aria-controls="participantsselection" aria-selected="false">
                                                Manage Membership
                                            </a>
                                        </li>
                                        <li class="nav-item">
                                            <a class="nav-link mb-0 px-0 py-1" data-bs-toggle="tab" href="#fileupload"
                                                role="tab" aria-controls="fileupload" aria-selected="false">
                                                File Upload
                                            </a>
                                        </li>
                                    </ng-template>
                                </ul>
                            </div>

                        </div>
                        <div role="form text-left" class="tab-content">
                            <div class="tab-pane fade show active" id="generalprojectdetails" role="tabpanel"
                                aria-labelledby="generalprojectdetails-tab">
                                <div class="row mt-3">
                                    <div class="col-12 col-sm-6">
                                        <label for="province">Province</label>
                                        <select class="form-control" id="province" [(ngModel)]="Province"
                                            (change)="onProvinceSelect($event)">
                                            <option value="" disabled>Select Province</option>
                                            <option *ngFor="let province of Provinces" value={{province.ProvinceID}}>
                                                {{province.Name}}</option>
                                        </select>
                                    </div>
                                    <div class="col-12 col-sm-6">
                                        <label for="district">District</label>
                                        <select class="form-control" id="district" [(ngModel)]="District"
                                            (change)="onDistrictSelect($event)">
                                            <option value="" disabled>Select District</option>
                                            <option *ngFor="let district of filteredDistricts"
                                                value={{district.DistrictID}}>{{district.Name}}</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="row mt-3">
                                    <div class="col-12 col-sm-6">
                                        <div class="col-12 col-sm-6">
                                            <label for="ward">Ward</label>
                                            <select class="form-control" id="ward" [(ngModel)]="Ward">
                                                <option value="" disabled>Select Ward</option>
                                                <option *ngFor="let ward of filteredWards" value={{ward.WardID}}>
                                                    {{ward.Name}}</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div class="col-12 col-sm-6">
                                        <label for="groupName">Group Name</label>
                                        <input class="form-control" type="text" id="groupName"
                                            [(ngModel)]="groupName" />
                                    </div>
                                </div>
                                <div class="row mt-3">
                                    <div class="col-12 col-sm-6">
                                        <label for="groupType">Group Type</label>
                                        <select class="form-control" id="groupType" [(ngModel)]="GroupType">
                                            <option value="" disabled>Select Group Type</option>
                                            <option *ngFor="let groupType of GroupTypes"
                                                value={{groupType.GroupTypeID}}>{{groupType.Description}}</option>
                                        </select>
                                    </div>
                                    <div class="col-12 col-sm-6">
                                        <label for="groupSize">Group Size</label>
                                        <input class="form-control" type="number" id="groupSize"
                                            [(ngModel)]="groupSize" />
                                    </div>
                                </div>
                                <div class="row mt-3">
                                    <div class="col-12">
                                        <label for="groupDescription">Description</label>
                                        <textarea class="form-control" id="groupDescription"
                                            [(ngModel)]="groupDescription"></textarea>
                                    </div>
                                </div>
                                <div class="row mt-3">
                                    <div class="col-12">
                                        <button type="button" class="btn bg-gradient-primary"
                                            (click)="saveGroup()">Save</button>
                                        <button type="button" class="btn btn-link  ml-auto"
                                            data-bs-dismiss="modal">Close</button>
                                    </div>
                                </div>
                            </div>


                            <div class="tab-pane fade" id="participantsselection" role="tabpanel"
                                aria-labelledby="participantsselection-tab">
                                <div class="card-body mt-0">
                                    <div class="table-responsive">
                                        <div class="dataTable-wrapper " id="">

                                                </table>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="row mt-3">
                                    <div class="col-12">
                                        <button type="button" class="btn bg-gradient-primary"
                                            (click)="saveGroup()">Save</button>
                                        <button type="button" class="btn btn-link  ml-auto"
                                            data-bs-dismiss="modal">Close</button>
                                    </div>
                                </div>
                            </div>
                            <div class="tab-pane fade" id="fileupload" role="tabpanel" aria-labelledby="fileupload-tab">
                                <form role="form text-left" class="tab-content">
                                    <div class="row mt-3">
                                        <div class="col-12 col-sm-6">
                                            <label>File Type</label>
                                            <select class="form-control">
                                                <option value="" disabled selected>Select File Type</option>
                                                <option value="Assessement">Assessement</option>
                                                <option value="DonorContract">Donor Contract</option>
                                                <option value="PartnerContract">Partner Contract</option>
                                                <option value="ProjectBaseline">Project Baseline</option>
                                                <option value="ServiceContracts">Service Contracts</option>
                                                <option value="LogFrameDocuments">LogFrame Documents</option>
                                                <option value="MEPlanDocuments">M&E Plan Documents</option>
                                                <option value="ProjectMeetings">Project Meetings</option>
                                            </select>
                                        </div>
                                        <div class="col-12 col-sm-6 mt-3 mt-sm-0">
                                            <label>Title</label>
                                            <input class="form-control" type="text" />
                                        </div>
                                    </div>
                                    <div class="row mt-3">
                                        <div class="col-12 col-sm-6">
                                            <label>Author</label>
                                            <input class="form-control" type="text" />
                                        </div>
                                        <div class="col-12 col-sm-6 mt-3 mt-sm-0">
                                            <label>Author Organisation</label>
                                            <input class="form-control" type="text" />
                                        </div>
                                    </div>
                                    <div class="row mt-3">

                                        <div class="col-12 col-sm-6 mt-3 mt-sm-0">
                                            <label>Description</label>
                                            <textarea class="form-control" type="text"></textarea>
                                        </div>
                                        <div class="col-12 col-sm-6">
                                            <label>Upload Date</label>
                                            <input class="form-control" type="date" />
                                        </div>
                                    </div>
                                    <div class="row mt-3">
                                        <div class="mb-3">
                                            <label for="formFile" class="form-label">File</label>
                                            <input class="form-control" type="file" id="formFile">
                                        </div>
                                    </div>
                                    <div class="row mt-3">
                                        <div class="col-12 col-sm-6 mt-3 mt-sm-0">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" value=""
                                                    id="chkFileSecurity" checked="">
                                                <label class="custom-control-label" for="chkFileSecurity">Apply
                                                    Security</label>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="row mt-3">
                                        <div class="col-12">
                                            <button type="button" class="btn bg-gradient-primary"
                                                (click)="saveGroup()">Save</button>
                                            <button type="button" class="btn btn-link  ml-auto"
                                                data-bs-dismiss="modal">Close</button>
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
