<div class="modal fade" id="filedetailsmodal" tabindex="-1" role="dialog" aria-labelledby="filedetailsmodal"
    aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg" role="document">
        <div class="modal-content">
            <div class="modal-header m-0">File Details
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">×</span>
                </button>
            </div>
            <div class="modal-body p-0">
                <div class="card card-plain">
                    <div class="card-body">
                        <form  role="form text-left" class="tab-content">
                            <div class="row mt-3">
                                <div class="col-12 col-sm-6">
                                    <label>File Type</label>
                                    <select class="form-control" name="fileType" [(ngModel)]="fileType">
                                        <option value="" disabled selected>Select File Type</option>
                                        <option *ngFor="let item of fileTypes" value={{item.Name}}>{{item.Name}}</option>
                                    </select>
                                </div>
                                <div class="col-12 col-sm-6 mt-3 mt-sm-0">
                                    <label>Title</label>
                                    <input class="form-control" name="title" [(ngModel)]="title" type="text" />
                                </div>
                            </div>
                            <div class="row mt-3">
                                <div class="col-12 col-sm-6">
                                    <label>Author</label>
                                    <input class="form-control" name="author" [(ngModel)]="author" type="text" />
                                </div>
                                <div class="col-12 col-sm-6 mt-3 mt-sm-0">
                                    <label>Author Organisation</label>
                                    <input class="form-control" name="authorOrganization"
                                        [(ngModel)]="authorOrganization" type="text" />
                                </div>
                            </div>
                            <div class="row mt-3">

                                <div class="col-12 col-sm-6 mt-3 mt-sm-0">
                                    <label>Description</label>
                                    <textarea class="form-control" name="description" [(ngModel)]="description"
                                        type="text"></textarea>
                                </div>
                                <div class="col-12 col-sm-6">
                                    <label>File Date</label>
                                    <input class="form-control" name="uploadDate" [(ngModel)]="uploadDate"
                                        type="date" />
                                </div>
                            </div>
                            <div class="row mt-3" *ngIf="userLibrary === false">
                                <div class="mb-3">
                                    <label for="formFile" class="form-label">File</label>
                                    <input class="form-control" type="file" id="formFile"
                                        (change)="onFileChange($event)">
                                </div>

                            </div>
                            <div class="row mt-3" *ngIf="userLibrary === false">
                                <div class="col-12 col-sm-6">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" value="" id="fcustomCheck1"
                                            checked="false" [(ngModel)]="applySecurity" name="applySecurity"
                                            (change)="addpermmssions()">
                                        <label class="custom-control-label mt-1" for="fcustomCheck1">Add File
                                            Permissions</label>
                                    </div>
                                </div>
                                <div class="col-12 col-sm-6" *ngIf="applySecurity === true">
                                    <label for="selectedusers">Select Users</label>
                                    <p-listbox
                                    [options]="items"
                                    [(ngModel)]="selectedItems"
                                    [selectAll]="selectAll"
                                    optionLabel="label"
                                    [style]="{ width: '15rem' }"
                                    [virtualScroll]="true"
                                    [filter]="true"
                                    [virtualScrollItemSize]="43"
                                    [multiple]="true"
                                    [checkbox]="true"
                                    [showToggleAll]="false"
                                    [metaKeySelection]="false"
                                    [showToggleAll]="true"
                                    (onSelectAllChange)="onSelectAllChange($event)"
                                    (onChange)="onChange($event)"
                                    [listStyle]="{ 'max-height': '220px' }"
                                    name ='checkbox'
                                ></p-listbox>
                                </div>
                            </div>
                            <div class="row mt-3">
                                <div class="col-12 col-sm-6 mt-3 mt-sm-0">
                                    <button *ngIf="currentUser.permissions.includes('AddOrDeleteFile') && userLibrary == false" (click)="saveFile()"
                                        class="btn btn-primary">Save</button>
                                    <button *ngIf="currentUser.permissions.includes('AddOrDeleteFile') && userLibrary == true" (click)="submitFile()"
                                        class="btn btn-primary">Submit</button>
                                    <button type="button" class="btn btn-link  ml-auto"
                                        data-bs-dismiss="modal">Close</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
