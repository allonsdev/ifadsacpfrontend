<div class="modal fade" id="manageparametersmodal" tabindex="-1" role="dialog"
  aria-labelledby="manageparametersmodal" aria-hidden="true"
  data-backdrop="static" data-keyboard="false">
  <div class="modal-dialog modal-dialog-centered modal-lg" role="document">
    <div class="modal-content">

      <div class="modal-header m-0">
        {{ ListName !== undefined ? ListName : "" }}
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" (click)="cancelEdit()">
          <span aria-hidden="true">×</span>
        </button>
      </div>

      <div class="modal-body p-0">
        <div class="card card-plain">
          <div class="card-body">

            <!-- ── FORM ─────────────────────────────────────────────── -->
            <form id="parameterForm" [formGroup]="dynamicForm" role="form" class="tab-content">

              <!-- Mode indicator badge -->
              <div class="mb-2">
                <span class="badge" [ngClass]="isEditMode ? 'bg-warning text-dark' : 'bg-primary'">
                  {{ isEditMode ? 'Edit Mode' : 'Add New' }}
                </span>
              </div>

              <div class="tab-pane fade show active" id="generalprojectdetails"
                role="tabpanel" aria-labelledby="generalprojectdetails-tab">
                <div class="row mt-3">
                  <div *ngFor="let column of columns" class="col-12 col-sm-6">
                    <label for="{{ column }}">{{ column }}</label>
                    <input
                      class="form-control"
                      type="text"
                      [formControlName]="column"
                      id="{{ column }}"
                      [attr.disabled]="column === parameter.PrimaryKey ? true : null">
                  </div>
                </div>

                <div class="row mt-3">
                  <div class="col-12 d-flex justify-content-start gap-2">
                    <!-- Save / Update button -->
                    <button type="button"
                      class="btn"
                      [ngClass]="isEditMode ? 'bg-gradient-warning' : 'bg-gradient-primary'"
                      (click)="onSubmit()">
                      {{ isEditMode ? 'Update' : 'Save' }}
                    </button>

                    <!-- Cancel Edit button — only shown in edit mode -->
                    <button *ngIf="isEditMode"
                      type="button"
                      class="btn btn-outline-secondary"
                      (click)="cancelEdit()">
                      Cancel
                    </button>

                    <button type="button" class="btn btn-link" data-bs-dismiss="modal" (click)="cancelEdit()">
                      Close
                    </button>
                  </div>
                </div>
              </div>
            </form>

            <!-- ── TABLE ────────────────────────────────────────────── -->
            <div class="container-fluid py-4">
              <div class="row mt-4">
                <div class="col-12 mt-4">
                  <div class="card mb-4">
                    <div class="card-body px-0 pt-0 pb-2">
                      <div class="table-responsive p-0">
                        <table class="table align-items-center mb-0"
                          style="height: 200px; overflow-y: auto;">
                          <thead>
                            <tr>
                              <th *ngFor="let column of columns">{{ column }}</th>
                              <th>Actions</th>
                            </tr>
                          </thead>
                          <tbody>
                            <tr *ngFor="let item of filteredData"
                              [ngClass]="{ 'table-warning': item[parameter.PrimaryKey] === editingId }">
                              <td *ngFor="let column of columns">{{ item[column] }}</td>
                              <td>
                                <!-- Edit button -->
                                <button class="btn btn-info btn-sm me-1"
                                  (click)="editItem(item)"
                                  title="Edit">
                                  <i class="fa fa-pencil" aria-hidden="true"></i>
                                </button>
                                <!-- Delete button -->
                                <button class="btn btn-danger btn-sm"
                                  (click)="deleteItem(item[parameter.PrimaryKey])"
                                  title="Delete">
                                  <i class="fa fa-trash" aria-hidden="true"></i>
                                </button>
                              </td>
                            </tr>
                          </tbody>
                        </table>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>
</div>
