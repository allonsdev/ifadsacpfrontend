<div class="modal fade" id="sitedetailsmodal" tabindex="-1" role="dialog" aria-labelledby="sitedetailsmodal"
    aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg" role="document">
        <div class="modal-content">
            <div class="modal-header m-0">Geo Coverage
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">×</span>
                </button>
            </div>
            <div class="modal-body p-0">
                <div class="card card-plain">
                    <div class="card-body">
                        <div class="card-header pb-0 text-left pt-0">
                            <div class="nav-wrapper position-relative end-0">
                                <ul class="nav nav-pills nav-fill p-1" role="tablist">
                                    <li class="nav-item">
                                        <a class="nav-link mb-0 px-0 py-1 active" data-bs-toggle="tab" href="#psites"
                                            role="tab" aria-controls="psites" aria-selected="true">
                                            Sites
                                        </a>
                                    </li>
                                    <li class="nav-item">
                                        <a class="nav-link mb-0 px-0 py-1" data-bs-toggle="tab" href="#regions"
                                            role="tab" aria-controls="regions" aria-selected="false">
                                            Regions
                                        </a>
                                    </li>
                                    <div class="moving-tab position-absolute nav-link"
                                        style="padding: 0px; transition: all 0.5s ease 0s; transform: translate3d(291px, 0px, 0px); width: 299px;">
                                    </div>
                                </ul>
                            </div>
                        </div>

                        <form role="form text-left" class="tab-content">
                            <div class="tab-pane fade show active" id="psites" role="tabpanel"
                                aria-labelledby="psites-tab">
                                <div class="row mt-3">
                                    <div class="col-12 col-sm-6">
                                        <label>Site Type</label>
                                        <select class="form-control" [(ngModel)]="projectSite.siteType"
                                            name="siteType">
                                            <option *ngFor="let item of siteTypes" value={{item.Name}}>{{item.Name}}
                                            </option>
                                        </select>
                                    </div>
                                    <div class="col-12 col-sm-6 mt-3 mt-sm-0">
                                        <label>Site Name</label>
                                        <input class="form-control" type="text" [(ngModel)]="projectSite.name"
                                            name="siteName">
                                    </div>
                                </div>
                                <div class="row mt-3">
                                    <!-- Bind other fields similarly with ngModel -->
                                    <div class="col-12 col-sm-6 mt-3 mt-sm-0">
                                        <label>Latitude</label>
                                        <input class="form-control" type="number" [(ngModel)]="projectSite.latitude"
                                            name="latitude">
                                    </div>
                                    <div class="col-12 col-sm-6 mt-3 mt-sm-0">
                                        <label>Longitude</label>
                                        <input class="form-control" type="number" [(ngModel)]="projectSite.longitude"
                                            name="longitude">
                                    </div>
                                </div>
                                <div class="row mt-3">
                                    <!-- Similarly bind the Province and District select fields -->
                                    <div class="col-12 col-sm-6">
                                        <label>Province</label>
                                        <select class="form-control" [(ngModel)]="projectSite.province"
                                            name="province" (change)="onProvinceSelect($event)">
                                            <option value="" disabled selected>Select Province</option>
                                            <option *ngFor="let item of provinces" value={{item.Name}}>{{item.Name}}
                                            </option>
                                        </select>
                                    </div>
                                    <div class="col-12 col-sm-6 mt-3 mt-sm-0">
                                        <label>District</label>
                                        <select class="form-control" [(ngModel)]="projectSite.district"
                                            name="district">
                                            <option value="" disabled selected>Select District</option>
                                            <option *ngFor="let item of filteredDistricts" value={{item.Name}}>
                                                {{item.Name}}</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="row mt-3">
                                    <div class="col-12 col-md-12 d-flex justify-content-end">

                                        <button *ngIf="projectSite.id === 0 || projectSite.id === undefined"
                                            type="button" class="btn bg-gradient-primary"
                                            (click)="createProjectSite()">Save</button>
                                        <button *ngIf="projectSite.id > 0" type="button" class="btn bg-gradient-primary"
                                            (click)="updateProjectSite()">Update</button>
                                        <button type="button" class="btn btn-link  ml-auto"
                                            data-bs-dismiss="modal">Close</button>
                                    </div>
                                </div>
                            </div>
                            <div class="tab-pane fade" id="regions" role="tabpanel" aria-labelledby="regions-tab">
                                <div class="card-body mt-0">
                                    <div class="row mb-2">
                                        <div class="col-12 col-sm-6">
                                            <label for="groupType">Region Level</label>
                                            <select class="form-control" id="groupType" (change)="onSelect($event)">
                                                <option value="" selected disabled>Select Level</option>
                                                <option value="1">Provinces</option>
                                                <option value="2">Districts</option>
                                                <option value="3">Wards</option>
                                                <option value="4">Clusters</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div class="card-body mt-0">
                                        <div class="table-responsive">
                                            <div class="dataTable-wrapper " id="">
                                                <div class="dataTable-container ">
                                                    <table
                                                        class="table table-striped table-bordered table-sm row-border hover"
                                                        width="100%" id="dtRegion">
                                                    </table>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="row mt-3">
                                        <div class="col-12 col-md-12 d-flex justify-content-end">
                                            <button type="button" class="btn bg-gradient-primary"
                                                (click)="sendSelectedData()">Save</button>
                                            <button type="button" class="btn btn-link  ml-auto"
                                                data-bs-dismiss="modal">Close</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
