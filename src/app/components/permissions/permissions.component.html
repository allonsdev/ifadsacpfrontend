<div class="container-fluid">
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-header p-3">
          <h5 class="mb-2">Permissions</h5>
        </div>

        <div class="card-body p-3">
          <div class="row">
            <div class="col-8 col-sm-4 mt-3 mt-sm-0">
              <label for="user">User</label>
              <select class="form-control" id="user" name="user" [(ngModel)]="selecteduser" (change)="onselect()">
                <option *ngFor="let item of staffmembers" value={{item.userId}}>
                  {{item.name}}</option>
              </select>
            </div>
          </div>
          <div class="row mt-3">
            <div class="col-md-12 mt-md-0 mt-4">
              <div class="card z-index-2">
                <div class="card-header p-3 pb-0">
                  <h6>Page Access</h6>
                </div>
                <div class="card-body p-3">
                  <div class="row">
                    <div class="col-8 col-sm-4 mt-2 mt-sm-0">
                      <label for="mainmenu">Main Menu</label>
                      <select multiple class="form-control" id="mainmenu" name="mainmenu" [(ngModel)]="mainmenuarray">
                        <option *ngFor="let item of mainmenu" [value]="item.id">
                          {{item.name}}
                        </option>
                      </select>
                      <button *ngIf="currentUser.permissions.includes('GivePermission')" type="button"
                        class="btn py-1 bg-gradient-primary mt-2" (click)="saveMainMenuPermissions()">Save</button>
                    </div>
                    <div class="col-8 col-sm-4 mt-2 mt-sm-0">
                      <label for="otherfacilitators">Existing Menu Permissions</label>
                      <select multiple class="form-control" id="existingmaminmenu" name="existingmaminmenu"
                        [(ngModel)]="mainmenupermissionstbr">
                        <option *ngFor="let item of existingmaminmenu" [value]="item.id">
                          {{item.name}}
                        </option>
                      </select>
                      <button *ngIf="currentUser.permissions.includes('GivePermission')" type="button"
                        class="btn py-1 btn-danger mt-2" (click)="removemenupermissions()">Remove</button>
                    </div>
                  </div>
                  <div class="row">
                    <div class="col-8 col-sm-4 mt-2 mt-sm-0">
                      <label for="otherfacilitators">Project Menu</label>
                      <select multiple class="form-control" id="submenu" name="submenu" [(ngModel)]="submenuarray">
                        <option *ngFor="let item of submenu" [value]="item.id">
                          {{item.name}}
                        </option>
                      </select>
                      <button *ngIf="currentUser.permissions.includes('GivePermission')" type="button"
                        class="btn py-1 bg-gradient-primary mt-2" (click)="saveSubMenuPermissions()">Save</button>
                    </div>
                    <div class="col-8 col-sm-4 mt-2 mt-sm-0">
                      <label for="otherfacilitators">Existing Project Menu Permissions</label>
                      <select multiple class="form-control" id="existingsubmenu" name="existingsubmenu"
                        [(ngModel)]="submenupermissionstbr">
                        <option *ngFor="let item of existingsubmenu" [value]="item.id">
                          {{item.name}}
                        </option>
                      </select>
                      <button *ngIf="currentUser.permissions.includes('GivePermission')" type="button"
                        class="btn py-1 btn-danger mt-2" (click)="removesubmenupermissions()">Remove</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="card-body p-3">
            <div class="row">
              <div class="col-md-12 mt-md-0 mt-4">
                <div class="card z-index-2">
                  <div class="card-header p-3 pb-0">
                    <h6>Command Access</h6>
                  </div>
                  <div class="card-body p-3">
                    <div class="row">
                      <div class="col-8 col-sm-4 mt-2 mt-sm-0">
                        <label for="commands">Commands</label>
                        <select multiple class="form-control" id="commands" name="commands" [(ngModel)]="commandsarray">
                          <option *ngFor="let item of commands" value={{item.id}}>
                            {{item.name}}</option>
                        </select>
                        <button *ngIf="currentUser.permissions.includes('GivePermission')" type="button"
                          class="btn py-1 bg-gradient-primary mt-2" (click)="saveCommandPermissions()">Save</button>
                      </div>
                      <div class="col-8 col-sm-4 mt-2 mt-sm-0">
                        <label for="existingcommand">Existing Project Menu Permissions</label>
                        <select multiple class="form-control" id="existingcommand" name="existingcommand"
                          [(ngModel)]="commandpermissionstbr">
                          <option *ngFor="let item of existingcommands" [value]="item.id">
                            {{item.name}}
                          </option>
                        </select>
                        <button *ngIf="currentUser.permissions.includes('GivePermission')" type="button"
                          class="btn py-1 btn-danger mt-2" (click)="removecommandpermissions()">Remove</button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
