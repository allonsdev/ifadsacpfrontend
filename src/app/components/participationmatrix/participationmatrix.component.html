<div class="container-fluid">
    <div class="row">
        <div class="col-12">
            <div class="card">

                <div class="card-header">
                    <h5 class="mb-0">Participation Matrix</h5>
                </div>

                <div class="card-body mt-0">
                    <div class="row mb-2">
                        <div class="col-12 col-sm-6">
                            <label for="matrixtype">Matrix Type</label>
                            <select class="form-control" id="matrixtype" (change)="LoadMatrix()"
                                [(ngModel)]="selectedValue">
                                <option value="" selected disabled>Select Matrix Type</option>
                                <option *ngFor="let item of participantTypes" value={{item.Id}}>
                                    {{item.Name}}</option>
                            </select>
                        </div>
                    </div>
                    <div class="row mb-2">
                        <div class="col-12 col-sm-6">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" value="" id="fcustomCheck1"
                                    checked="false" [(ngModel)]="checked" name="checked" (change)="LoadMatrix()">
                                <label class="custom-control-label mt-1" for="fcustomCheck1">Show actual participation count per activity</label>
                            </div>
                        </div>
                    </div>
                    <div class="card-body mt-0">
                        <div class="table-responsive">
                            <div class="dataTable-wrapper " id="">
                                <div class="dataTable-container ">
                                    <table class="table table-striped table-bordered table-sm row-border hover"
                                        width="100%" id="dtParticipantMatrix">
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer pt-3">

    </footer>

</div>
