<div class="container-fluid">
    <div class="row">
        <div class="col-lg-12 col-12 mx-auto">

            <div class="card card-body ">
                <h6 class="mb-0">Project Georaphical Coverage</h6>
                <div class="card card-plain">
                    <div class="card-body">

                        <div class="card-header pb-0 text-left pt-0">
                            <div class="nav-wrapper position-relative end-0">
                                <ul class="nav nav-pills nav-fill p-1" role="tablist">
                                    <li class="nav-item">
                                        <a class="nav-link mb-0 px-0 py-1 active" data-bs-toggle="tab" href="#sites"
                                            role="tab" aria-controls="sites" aria-selected="true" (click)="loadSites()">
                                            Sites
                                        </a>
                                    </li>
                                    <li class="nav-item">
                                        <a class="nav-link mb-0 px-0 py-1" data-bs-toggle="tab" href="#provinces"
                                            role="tab" aria-controls="provinces" aria-selected="false"
                                            (click)="loadProvinces()">
                                            Provinces
                                        </a>
                                    </li>
                                    <li class="nav-item">
                                        <a class="nav-link mb-0 px-0 py-1" data-bs-toggle="tab" href="#districts"
                                            role="tab" aria-controls="districts" aria-selected="false"
                                            (click)="loadDistricts()">
                                            Districts
                                        </a>
                                    </li>
                                    <li class="nav-item">
                                        <a class="nav-link mb-0 px-0 py-1" data-bs-toggle="tab" href="#wards" role="tab"
                                            aria-controls="wards" aria-selected="false" (click)="loadWards()">
                                            Wards
                                        </a>
                                    </li>
                                    <li class="nav-item">
                                        <a class="nav-link mb-0 px-0 py-1" data-bs-toggle="tab" href="#clusters"
                                            role="tab" aria-controls="clusters" aria-selected="false"
                                            (click)="loadClusters()">
                                            Clusters
                                        </a>
                                    </li>
                                    <div class="moving-tab position-absolute nav-link"
                                        style="padding: 0px; transition: all 0.5s ease 0s; transform: translate3d(291px, 0px, 0px); width: 299px;">
                                    </div>
                                </ul>
                            </div>
                        </div>
                        <form role="form text-left" class="tab-content">
                            <div class="map-container mt-3">
                                <div class="map-frame" style="height: 600px; border: 2px solid rgb(158, 158, 158);">
                                    <div id="map" class="h-100" style="height: 400px;"></div>
                                </div>
                            </div>
                            <h6 class="mt-3">{{title}}</h6>
                            <div class="card-body mt-0">
                                <div class="table-responsive">
                                    <div class="dataTable-wrapper " id="">
                                        <div class="dataTable-container ">
                                            <table
                                                class="table table-striped table-bordered table-sm row-border hover"
                                                width="100%" id="dtPGC">
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div *ngIf="currentUser.permissions.includes('AlterGeoCoverage')" class="text-start mx-1">
                                <button type="button" class="btn bg-gradient-primary mb-3" data-bs-toggle="modal"
                                    data-bs-target="#sitedetailsmodal">Add New</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            <footer class="footer pt-3 ">
            </footer>
            <sitedetailsmodal [projectSite]="editObject" (refresh)="refresh()"></sitedetailsmodal>
        </div>
