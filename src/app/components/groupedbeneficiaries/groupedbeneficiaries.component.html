<div class="container-fluid">
  <div class="row">
    <div class="col-12">
      <div class="card">

        <div class="card-header">
          <h5 class="mb-0">Groups</h5>
        </div>
        <div class="card-body mt-0">
          <div class="row mb-4">
            <div class="col-12 col-sm-6">
              <label for="groupType">Value Chain</label>
              <select class="form-control" id="groupType" (change)="onSelect($event)">
                <option value="" selected>Select Value Chain</option>
                <option *ngFor="let item of valuechains" value={{item}}>
                  {{item}}</option>
              </select>
            </div>
          </div>
          <div class="table-responsive">
            <div class="dataTable-wrapper " id="">
              <div class="dataTable-container ">
                <table class="table table-striped table-bordered table-sm row-border hover" width="100%" id="dtGroup">
                </table>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <footer class="footer pt-3">
    
  </footer>

  <div class="row">
    <div class="col-md-4">
      <viewparticipationmodal [id]="id" [objectId]="2"></viewparticipationmodal>
    </div>
  </div>

</div>
