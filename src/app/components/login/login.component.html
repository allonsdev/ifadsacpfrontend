<div class="page-header min-vh-100">
  <div class="container py-5 h-100">
    <div class="row d-flex justify-content-center align-items-center h-100">
      <div class="col col-4">
        <div class="card card-plain">
          <div class="card-header pb-0 text-start">
            <h4 class="font-weight-bolder">Sign In</h4>
            <p class="mb-0">Enter your username and password to sign in</p>
          </div>
          <div class="card-body">
            <form role="form" (ngSubmit)="login()" [formGroup]="loginForm" novalidate>
              <div class="mb-3">
                <input type="text" class="form-control form-control-lg" placeholder="Username" aria-label="Username"
                  formControlName="username">
                <div *ngIf="loginForm.get('username')?.invalid && loginForm.get('username')?.touched"
                  class="text-danger text-sm">Username is required</div>
              </div>
              <div class="mb-3">
                <input type="password" class="form-control form-control-lg" placeholder="Password" aria-label="Password"
                  formControlName="password">
                <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
                  class="text-danger text-sm">Password is required</div>
              </div>
              <div class="text-center">
                <button type="submit" class="btn btn-lg bg-gradient-primary btn-lg w-100 mt-4 mb-0">Sign in</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
