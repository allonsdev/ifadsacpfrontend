<div class="container-fluid">
  <div class="row">
    <div class="col-12">
      <div class="card">

        <div class="card-header">
          <h5 class="mb-0">Indicators</h5>
        </div>
        <div class="text-start mx-4">
          <button type="button" *ngIf="currentUser.permissions.includes('AddorEditIndicator')"
            class="btn bg-gradient-primary mb-3" data-bs-toggle="modal" data-bs-target="#indicatordetailsmodal"
            (click)="addnew()">Add New Indicator</button>
        </div>

        <div class="card-body mt-0">
          <div class="table-responsive">
            <div class="dataTable-wrapper " id="">
              <div class="dataTable-container ">
                <table class="table table-striped table-bordered table-sm row-border hover" width="100%"
                  id="dtIndicators">
                </table>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <footer class="footer pt-3">
    
  </footer>

  <div class="row">
    <div class="col-md-4">
      <indicatordetailsmodal #indicatorDetailsModal [editid]="editObject" (refresh)="getRegister()"></indicatordetailsmodal>

    </div>
  </div>

</div>
