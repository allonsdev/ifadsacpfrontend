<div class="container-fluid">
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-header">
          <h5 class="mb-0">Upload MSE Excel File</h5>
        </div>

        <!-- File Upload Section -->
        <div class="row m-3">
          <div class="col-12">
            <label for="fileInput">Upload Excel File</label>
            <input
              type="file"
              id="fileInput"
              (change)="onFileChange($event)"
              accept=".xlsx, .xls"
              class="form-control"
            />
          </div>
          <div class="col-12">
            <button
              type="button"
              class="btn bg-gradient-primary mb-3 mt-5"
              (click)="sendSelectedData()"
            >
              Upload and Process
            </button>
          </div>
        </div>

        <!-- Data Table -->
        <div class="card-body mt-0" *ngIf="failedRecords.length > 0">
  <h5 class="mb-3 text-danger">Failed Records</h5>
  <div class="table-responsive">
    <table class="table table-striped table-bordered table-sm row-border hover" width="100%">
      <thead>
        <tr>
          <th>Name Of Business</th>
          <th>Trading Name</th>
          <th>Province</th>
          <th>Ward</th>
          <th>Contact Person</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let record of failedRecords">
          <td>{{ record.NameOfBusiness }}</td>
          <td>{{ record.TradingName }}</td>
          <td>{{ record.Province }}</td>
          <td>{{ record.Ward }}</td>
          <td>{{ record.ContactPerson }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

      </div>
    </div>
  </div>

  <footer class="footer pt-3"></footer>
</div>
