<div class="container-fluid">
  <div class="row">
    <div class="col-12">
      <div class="card">

        <div class="card-header">
          <h5 class="mb-0">Users</h5>
        </div>
        <div *ngIf="currentUser.permissions.includes('AlterUser')" class="text-start mx-4">
          <button type="button" class="btn bg-gradient-primary mb-3" data-bs-toggle="modal" data-bs-target="#usersmodal"
            (click)="addnew()">Create New Account</button>
        </div>
        <div class="card-body mt-0">
          <div class="table-responsive">
            <div class="dataTable-wrapper " id="">
              <div class="dataTable-container ">
                <table class="table table-striped table-bordered table-sm row-border hover" width="100%" id="dtUsers">
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer pt-3">
    
  </footer>

  <div class="row">
    <div class="col-md-4">
      <usersmodal [user]="editObject" (refresh)="getRegister()"></usersmodal>
    </div>
  </div>

</div>
