<div class="container-fluid">
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-header">
          <h5 class="mb-0">Upload VBU Excel File</h5>
        </div>

        <!-- File Upload Section -->
        <div class="row m-3">
          <div class="col-12">
            <label for="fileInput">Upload Excel File</label>
            <input
              type="file"
              id="fileInput"
              (change)="onFileChange($event)"
              accept=".xlsx, .xls"
              class="form-control"
            />
          </div>
          <div class="col-12">
            <button
              type="button"
              class="btn bg-gradient-primary mb-3 mt-5"
              (click)="sendSelectedData()"
            >
              Upload and Process
            </button>
          </div>
        </div>

        <!-- Data Table -->
       <!-- Data Table -->
<div class="card-body mt-0">
  <div class="table-responsive">
    <div class="dataTable-wrapper">
      <div class="dataTable-container">
        <table
          class="table table-striped table-bordered table-sm row-border hover"
          width="100%"
          id="dtFailedRecords"
        >
          <thead>
            <tr>
              <th>Row Number</th>
              <th>Household Identifier Number</th>
              <th>Name</th>
              <th>Surname</th>
              <th>Error Message</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let record of failedRecords; let i = index">
              <td>{{ i + 1 }}</td>
              <td>{{ record.householdIdentifierNumber }}</td>
              <td>{{ record.name }}</td>
              <td>{{ record.surname }}</td>
              <td>{{ record.errorMessage }}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

      </div>
    </div>
  </div>

  <footer class="footer pt-3"></footer>
</div>
