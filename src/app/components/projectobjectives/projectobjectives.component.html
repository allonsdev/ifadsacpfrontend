<div class="container-fluid">
    <div class="row">
        <div class="col-lg-10 col-12 mx-auto">
            <div class="card card-body">
                <h6 class="mb-0">Project Objectives</h6>
                <p class="text-sm mb-0">Add Project Objectives</p>
                <hr class="horizontal dark my-3">
                <label for="projectName" class="form-label">Project Name</label>
                <input type="text" class="form-control" id="projectName" value="Smallholder Agriculture Cluster Project"
                    name="projectName" disabled>
                <div class="row mt-4">
                    <div class="col-12">
                        <div class="form-group">
                            <label> Project Objective</label>
                            <textarea type="text" class="form-control" id="projectobjective" name="objective"
                                [(ngModel)]="Objective"></textarea>
                        </div>
                    </div>
                </div>
                <div *ngIf="currentUser.permissions.includes('AlterLogframe')" class="text-start mx-1">
                    <button type="button" class="btn bg-gradient-primary mb-3" (click)="save()">Save</button>
                </div>
                <div class="card-body mt-0">
                    <div class="table-responsive">
                        <div class="dataTable-wrapper " id="">
                            <div class="dataTable-container ">
                                <table class="table table-striped table-bordered table-sm row-border hover" width="100%"
                                    id="dtObjective">
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer class="footer pt-3 ">
        
    </footer>
</div>
