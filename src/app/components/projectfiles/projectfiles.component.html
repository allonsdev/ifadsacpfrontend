<div class="container-fluid">
  <div class="row">
    <div class="col-lg-12 col-12 mx-auto">

      <div class="card card-body">
        <h6 class="mb-0">Project Files</h6>
        <div class="card card-plain">

          <div class="card-body">
            <div class="text-start mx-1">
              <button *ngIf="currentUser.permissions.includes('AddOrDeleteFile')" type="button"
                class="btn bg-gradient-primary mb-3" data-bs-toggle="modal" data-bs-target="#filedetailsmodal">Add New
                File</button>
            </div>

            <div class="card-body mt-0">
              <div class="table-responsive">
                <div class="dataTable-wrapper " id="">
                  <div class="dataTable-container ">
                    <table class="table table-striped table-bordered table-sm row-border hover" width="100%"
                      id="dtFiles">
                    </table>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <footer class="footer pt-3 ">
      
    </footer>

    <div class="row">
      <div class="col-md-4">
        <filedetailsmodal [userLibrary]="false"></filedetailsmodal>
      </div>
    </div>
  </div>
