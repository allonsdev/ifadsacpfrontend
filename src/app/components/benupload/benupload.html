<div class="container-fluid">
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-header">
          <h5 class="mb-0">Upload Beneficiary Excel File</h5>
        </div>

        <!-- File Upload Section -->
        <div class="row m-3">
          <div class="col-12">
            <label for="fileInput">Upload Excel File</label>
            <input
              type="file"
              id="fileInput"
              (change)="onFileChange($event)"
              accept=".xlsx, .xls"
              class="form-control"
            />
          </div>
          <div class="col-12">
            <button
              type="button"
              class="btn bg-gradient-primary mb-3 mt-5"
              (click)="sendSelectedData()"
            >
              Upload and Process
            </button>
          </div>
        </div>

        <!-- Data Table -->
        <div class="card-body mt-0">
          <div class="table-responsive">
            <div class="dataTable-wrapper" id="">
              <div class="dataTable-container">
                <table
                  class="table table-striped table-bordered table-sm row-border hover"
                  width="100%"
                  id="dtEOIBeneficiaries"
                >
                  <thead>
                    <tr>
                      <th>Household Identifier Number</th>
                      <th>Name</th>
                      <th>Surname</th>
                      <th>Status</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr *ngFor="let beneficiary of beneficiariesData">
                      <td>{{ beneficiary.householdIdentifierNumber }}</td>
                      <td>{{ beneficiary.name }}</td>
                      <td>{{ beneficiary.surname }}</td>
                      <td>{{ beneficiary.status }}</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer pt-3"></footer>
</div>
