<div class="container-fluid">
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-header">
          <h5 class="mb-0">Map Activities to Sub-Activities</h5>
        </div>
        <div class="text-start mx-4">
          <div class="row mt-3">
            <div class="col-12 col-sm-6">
              <label for="component">Component</label>
              <select
                class="form-control"
                id="component"
                name="componentId"
                [(ngModel)]="componentId"
                (change)="onComponentSelect($event)"
              >
                <option *ngFor="let item of components" value="{{ item.Id }}">
                  {{ item.Name }}
                </option>
              </select>
            </div>
          </div>
          <div class="row mt-3">
            <div class="col-12 col-sm-6">
              <label for="subComponent">Sub-Component</label>
              <select
                class="form-control"
                id="subComponent"
                name="subComponentId"
                [(ngModel)]="subComponentId"
                (change)="onSubComponentSelect($event)"
              >
                <option
                  *ngFor="let item of filteredSubComponents"
                  value="{{ item.Id }}"
                >
                  {{ item.Name }}
                </option>
              </select>
            </div>
          </div>

          <div class="row mt-3">
            <div class="col-12 col-sm-6">
              <label for="activity">Activity</label>
              <select
                class="form-control"
                id="activity"
                name="activityid"
                [(ngModel)]="activityId"
                (change)="onActivitySelect(activityId)"
              >
                <option
                  *ngFor="let item of filteredActvities"
                  [value]="item.id"
                >
                  {{ item.description }}
                </option>
              </select>
            </div>
          </div>
        </div>

        <div class="card-body mt-0">
          <div class="table-responsive">
            <div class="dataTable-wrapper" id="">
              <div class="dataTable-container">
                <table
                  class="table table-striped table-bordered table-sm row-border hover"
                  width="100%"
                  id="dtActivitiesSubComponent"
                ></table>
              </div>
            </div>
          </div>
        </div>
        <div class="text-start mx-4">
          <button
            type="button"
            class="btn bg-gradient-primary mb-3"
            (click)="sendSelectedData()"
          >
            Save
          </button>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer pt-3"></footer>
</div>
